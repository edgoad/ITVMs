---
- name: Set system hostname to ubuntu
  hostname:
    name: ubuntu

- name: Ensure required apt packages are installed
  apt:
    name:
      - curl
      - wget
      - python3
      - python3-pip
      - telnet
      - ftp
      - git
      - apt-transport-https
      - gnupg
      - snapd
    state: present
    update_cache: yes
    cache_valid_time: 3600

- name: Upgrade all installed packages
  apt:
    upgrade: dist
    update_cache: yes
    cache_valid_time: 3600

- name: Autoremove unnecessary packages
  apt:
    autoremove: yes

- name: Ensure snap package postman is installed
  snap:
    name: postman
    state: present

