- name: Configure GNOME idle delay if desktop session is available
  become: yes
  become_user: "{{ ansible_user_id }}"
  shell: |
    dbus-launch gsettings set org.gnome.desktop.session idle-delay 0
  register: gsettings_idle
  changed_when: gsettings_idle.rc == 0
  failed_when: false
  environment:
    LANG: C

- name: Configure GNOME favorite apps if desktop session is available
  become: yes
  become_user: "{{ ansible_user_id }}"
  shell: |
    dbus-launch gsettings set org.gnome.shell favorite-apps "{{ gnome_favorite_apps }}"
  args:
    executable: /bin/bash
  register: gsettings_favorites
  changed_when: gsettings_favorites.rc == 0
  failed_when: false
  environment:
    LANG: C

- name: Remove shell script files from current user home directory
  shell: rm -f "{{ ansible_env.HOME }}"/*.sh
  args:
    warn: false

- name: Clear current shell history
  shell: history -c
  args:
    warn: false
  changed_when: false
